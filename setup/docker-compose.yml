# One-command backing services for the Ambiguity VKGQA benchmark.
#
#   noise_pg    PostgreSQL  — holds the 6 noise datasets (one schema/db each)
#   ambrosia_mysql  MySQL   — holds the 846 AMBROSIA databases (one schema each)
#   webqsp_store    Virtuoso — loads the shipped WebQSP 668M RDF graph
#
# Ontop SPARQL endpoints are started ON TOP of these by the start scripts
# (start_vkgqa.sh / .ps1), per dataset — see setup/README.md.
#
# All ports bind to 127.0.0.1 only (no public exposure).

services:
  noise_pg:
    image: postgres:16
    container_name: bench_noise_pg
    environment:
      POSTGRES_USER: noise
      POSTGRES_PASSWORD: noise
      POSTGRES_DB: postgres
    command:
      - "-c"
      - "max_locks_per_transaction=1024"
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - bench_noise_pg_data:/var/lib/postgresql/data
    networks: [bench_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noise"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  ambrosia_mysql:
    image: mysql:8.0
    container_name: bench_ambrosia_mysql
    command:
      - --lower_case_table_names=1
      - --local-infile=1
      - --max_allowed_packet=512M
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ambrosia
      MYSQL_USER: ambrosia
      MYSQL_PASSWORD: ambrosia
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - bench_ambrosia_mysql_data:/var/lib/mysql
    networks: [bench_net]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pambrosia"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  # Triplestore for the shipped WebQSP RDF graph (668M triples).
  # The start script bulk-loads benchmark/datasets/webqsp/graph/*.nt.gz into it.
  webqsp_store:
    image: openlink/virtuoso-opensource-7:latest
    container_name: bench_webqsp_store
    environment:
      DBA_PASSWORD: dba
      VIRT_Parameters_NumberOfBuffers: "170000"
      VIRT_Parameters_MaxDirtyBuffers: "130000"
    ports:
      - "127.0.0.1:8890:8890"   # SPARQL endpoint: http://localhost:8890/sparql
      - "127.0.0.1:1111:1111"
    volumes:
      - bench_webqsp_store_data:/database
      - ../datasets/webqsp/graph:/graph:ro   # the .nt.gz to load
    networks: [bench_net]
    restart: unless-stopped

networks:
  bench_net:
    name: bench_net

volumes:
  bench_noise_pg_data:
    name: bench_noise_pg_data
  bench_ambrosia_mysql_data:
    name: bench_ambrosia_mysql_data
  bench_webqsp_store_data:
    name: bench_webqsp_store_data
